<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#090d16" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#60a5fa" />
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  
  <!-- Outer glowing tech borders -->
  <rect x="24" y="24" width="464" height="464" rx="104" fill="none" stroke="url(#glowGrad)" stroke-width="4" stroke-opacity="0.2" />
  <rect x="40" y="40" width="432" height="432" rx="88" fill="none" stroke="url(#glowGrad)" stroke-width="2" stroke-opacity="0.1" />

  <!-- AI network node paths visual -->
  <g opacity="0.15">
    <circle cx="120" cy="140" r="4" fill="#3b82f6" />
    <circle cx="392" cy="140" r="4" fill="#3b82f6" />
    <circle cx="120" cy="372" r="4" fill="#3b82f6" />
    <circle cx="392" cy="372" r="4" fill="#3b82f6" />
    <line x1="120" y1="140" x2="392" y2="140" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4" />
    <line x1="120" y1="372" x2="392" y2="372" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4" />
    <line x1="120" y1="140" x2="120" y2="372" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4" />
    <line x1="392" y1="140" x2="392" y2="372" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4" />
  </g>

  <!-- Branded LinkedIn Blue Tech Circle -->
  <circle cx="256" cy="256" r="130" fill="#1e293b" stroke="url(#glowGrad)" stroke-width="12" filter="url(#softGlow)" />
  
  <!-- The Code Brackets and 'AI' Central Emblem -->
  <!-- Left Bracket < -->
  <path d="M 176 216 L 136 256 L 176 296" fill="none" stroke="#2563eb" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Right Bracket > -->
  <path d="M 336 216 L 376 256 L 336 296" fill="none" stroke="#2563eb" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" />

  <!-- LinkedIn in Logo Overlay Styled with Futuristic Touch -->
  <!-- "in" style graphics -->
  <g transform="translate(196, 186)" fill="#ffffff">
    <!-- Letter 'i' -->
    <rect x="14" y="44" width="22" height="64" rx="4" />
    <circle cx="25" cy="20" r="13" />
    
    <!-- Letter 'n' -->
    <path d="M 46 44 L 46 108 L 68 108 L 68 76 C 68 64, 82 60, 88 72 L 88 108 L 110 108 L 110 66 C 110 44, 88 40, 68 54 L 68 44 Z" />
  </g>

  <!-- Golden optimization spark spark/star -->
  <g transform="translate(350, 130)" filter="url(#softGlow)">
    <path d="M 24 0 L 30 14 L 44 20 L 30 26 L 24 40 L 18 26 L 4 20 L 18 14 Z" fill="#eab308" />
  </g>
</svg>
